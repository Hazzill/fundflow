<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FundFlow Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'ui-sans-serif', 'system-ui', 'sans-serif']
            },
            colors: {
              profit: '#7cc713',
              loss: '#ef4aa8',
              ink: '#101010',
              line: '#27272a',
              panel: '#16181d',
              panelAlt: '#111318',
              panelMuted: '#0b0d10'
            },
            boxShadow: {
              soft: '0 18px 40px rgba(0, 0, 0, 0.28)'
            }
          }
        }
      };
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(124, 199, 19, 0.10), transparent 24%),
          radial-gradient(circle at top right, rgba(239, 74, 168, 0.10), transparent 20%),
          linear-gradient(180deg, #06070a 0%, #0b0d10 100%);
        min-height: 100vh;
      }

      .sparkline path {
        vector-effect: non-scaling-stroke;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100 antialiased">
    <div class="mx-auto max-w-[1380px] px-3 py-3 sm:px-4 md:px-6 lg:px-8">
      <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_380px]">
        <section class="min-w-0">
          <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <h1 id="appTitle" class="text-[17px] font-semibold tracking-tight text-white sm:text-[18px] md:text-[20px]">Trading calendar</h1>
              <div class="flex items-center gap-1.5 text-xs text-zinc-400 sm:gap-2 sm:text-sm">
                <button id="prevMonthBtn" type="button" class="inline-flex h-7 w-7 items-center justify-center rounded-full border border-transparent text-zinc-200 transition hover:border-zinc-700 hover:bg-zinc-900">
                  <span aria-hidden="true">&#9664;</span>
                </button>
                <div id="monthLabel" class="min-w-[108px] text-xs font-medium text-zinc-200 sm:min-w-[120px] sm:text-sm">Loading...</div>
                <button id="nextMonthBtn" type="button" class="inline-flex h-7 w-7 items-center justify-center rounded-full border border-transparent text-zinc-200 transition hover:border-zinc-700 hover:bg-zinc-900">
                  <span aria-hidden="true">&#9662;</span>
                </button>
              </div>
            </div>

            <div class="flex flex-wrap items-center gap-2">
              <div id="storageInfo" class="rounded-full border border-zinc-800 bg-zinc-900/80 px-3 py-1.5 text-[11px] font-medium text-zinc-300 sm:text-xs">Preparing API...</div>
              <button id="seedBtn" type="button" class="rounded-full border border-zinc-800 bg-zinc-900/80 px-3 py-2 text-xs font-medium text-zinc-200 transition hover:border-zinc-700 hover:bg-zinc-800 sm:text-sm">Sample</button>
              <button id="refreshBtn" type="button" class="rounded-full border border-zinc-700 bg-zinc-800 px-4 py-2 text-xs font-semibold text-zinc-100 transition hover:border-zinc-600 hover:bg-zinc-700 sm:text-sm">Refresh</button>
            </div>
          </div>

          <div id="calendarWeekdays" class="mb-3 grid grid-cols-7 gap-1.5 sm:mb-4 sm:gap-2 md:gap-3"></div>
          <div id="calendarGrid" class="grid grid-cols-7 gap-1.5 sm:gap-2 md:gap-3"></div>
        </section>

        <aside class="grid gap-4 sm:grid-cols-2 xl:grid-cols-1">
          <article class="rounded-xl border border-zinc-800 bg-zinc-900/90 p-5 shadow-soft backdrop-blur-sm">
            <div class="grid grid-cols-[minmax(0,1fr)_140px] items-center gap-4">
              <div>
                <div class="text-[12px] font-semibold text-zinc-100 underline decoration-1 underline-offset-4 sm:text-[13px]">Total PnL</div>
                <div id="totalPnlValue" class="mt-3 text-[18px] font-semibold tracking-tight text-loss sm:text-[20px]">0.00 USDT</div>
                <div id="totalPnlMeta" class="mt-1 text-[11px] font-normal text-zinc-400 sm:text-xs">0 recorded days</div>
              </div>
              <svg id="pnlSparkline" class="sparkline h-[92px] w-full" viewBox="0 0 180 100" preserveAspectRatio="none"></svg>
            </div>
          </article>

          <article class="rounded-xl border border-zinc-800 bg-zinc-900/90 p-5 shadow-soft backdrop-blur-sm">
            <div class="grid grid-cols-[minmax(0,1fr)_112px] items-center gap-4">
              <div>
                <div class="text-[12px] font-semibold text-zinc-100 underline decoration-1 underline-offset-4 sm:text-[13px]">Profit factor</div>
                <div id="profitFactorValue" class="mt-3 text-[18px] font-semibold tracking-tight text-zinc-100 sm:text-[20px]">0.00</div>
              </div>
              <div class="mx-auto grid h-24 w-24 place-items-center rounded-full" id="profitFactorRing" style="background: conic-gradient(#7cc713 0turn, #7cc713 0.12turn, #ef4aa8 0.12turn, #ef4aa8 1turn);">
                <div class="grid h-[76px] w-[76px] place-items-center rounded-full bg-zinc-950 text-sm font-semibold text-zinc-100" id="profitFactorRingLabel">0.00</div>
              </div>
            </div>
          </article>

          <article class="rounded-xl border border-zinc-800 bg-zinc-900/90 p-5 shadow-soft backdrop-blur-sm">
            <div class="grid grid-cols-[minmax(0,1fr)_128px] items-center gap-4">
              <div>
                <div class="text-[12px] font-semibold text-zinc-100 underline decoration-1 underline-offset-4 sm:text-[13px]">Win rate</div>
                <div class="mt-4 flex items-baseline gap-4">
                  <div>
                    <div class="text-[11px] font-medium text-zinc-300 sm:text-xs">Win rate</div>
                    <div id="winRateValue" class="text-[18px] font-semibold tracking-tight text-[#2d8f09] sm:text-[20px]">0.00%</div>
                  </div>
                  <div>
                    <div class="text-[11px] font-medium text-zinc-300 sm:text-xs">Loss rate</div>
                    <div id="lossRateValue" class="text-[18px] font-semibold tracking-tight text-[#c23b8b] sm:text-[20px]">0.00%</div>
                  </div>
                </div>
              </div>
              <div class="relative mx-auto h-[72px] w-[128px] overflow-hidden">
                <div id="winRateGauge" class="absolute inset-x-0 top-0 mx-auto h-[128px] w-[128px] rounded-full" style="background: conic-gradient(from 180deg, #7cc713 0turn, #7cc713 0.18turn, #ef4aa8 0.18turn, #ef4aa8 0.5turn, transparent 0.5turn);"></div>
                <div class="absolute left-1/2 top-5 h-[88px] w-[88px] -translate-x-1/2 rounded-full bg-zinc-900"></div>
              </div>
            </div>
          </article>

          <article class="rounded-xl border border-zinc-800 bg-zinc-900/90 p-5 shadow-soft backdrop-blur-sm">
            <div class="text-[12px] font-semibold text-zinc-100 underline decoration-1 underline-offset-4 sm:text-[13px]">Risk/reward ratio</div>
            <div class="mt-4 grid grid-cols-[minmax(0,1fr)_170px] items-center gap-4">
              <div id="riskRewardValue" class="text-[18px] font-semibold tracking-tight text-zinc-100 sm:text-[20px]">1:0.00</div>
              <div>
                <div class="h-2.5 overflow-hidden rounded-full bg-zinc-800">
                  <div class="flex h-full">
                    <div id="riskProfitBar" class="h-full bg-profit" style="width:50%"></div>
                    <div id="riskLossBar" class="h-full bg-loss" style="width:50%"></div>
                  </div>
                </div>
                <div class="mt-2 flex items-center justify-between text-[11px] font-medium sm:text-[12px]">
                  <span id="avgWinValue" class="text-zinc-200">+$0.00</span>
                  <span id="avgLossValue" class="text-zinc-200">-$0.00</span>
                </div>
              </div>
            </div>
          </article>
        </aside>
      </div>

    </div>

    <div id="resultModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 px-3 py-6 backdrop-blur-sm sm:px-4">
      <div id="resultModalPanel" class="w-full max-w-md rounded-3xl border border-zinc-800 bg-zinc-900/95 p-5 shadow-2xl backdrop-blur-xl sm:p-6">
        <div class="mb-5 flex items-start justify-between gap-4">
          <div>
            <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-zinc-400 sm:text-xs">Daily Result</div>
            <h2 class="mt-1 text-lg font-semibold tracking-tight text-zinc-100">Record selected day</h2>
            <p class="mt-1 text-[11px] text-zinc-400 sm:text-xs">Create or update the result for this calendar date.</p>
          </div>
          <div class="flex items-center gap-2">
            <div id="selectedDateBadge" class="rounded-full border border-zinc-700 bg-zinc-950 px-3 py-1.5 text-[11px] font-medium text-zinc-300 sm:text-xs">No date selected</div>
            <button id="closeModalBtn" type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-zinc-700 text-zinc-400 transition hover:bg-zinc-800">✕</button>
          </div>
        </div>

        <form id="tradeForm" class="space-y-4">
          <div>
            <label for="selectedDateInput" class="mb-1.5 block text-sm font-medium text-zinc-300">Selected date</label>
            <input id="selectedDateInput" name="resultDate" type="date" readonly required class="h-11 w-full rounded-xl border border-zinc-700 bg-zinc-950 px-3 text-sm font-medium text-zinc-200 outline-none ring-0">
          </div>

          <div>
            <label for="pnlInput" class="mb-1.5 block text-sm font-medium text-zinc-300">Result</label>
            <input id="pnlInput" name="pnl" type="number" step="0.01" required placeholder="เช่น 120.50 หรือ -45.00" class="h-11 w-full rounded-xl border border-zinc-700 bg-zinc-950 px-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-500">
          </div>

          <div>
            <label for="noteInput" class="mb-1.5 block text-sm font-medium text-zinc-300">Note</label>
            <textarea id="noteInput" name="note" rows="4" placeholder="บันทึกสั้น ๆ ของวันนั้น" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-3 py-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-500"></textarea>
          </div>

          <div class="flex gap-3">
            <button id="cancelModalBtn" type="button" class="inline-flex h-11 flex-1 items-center justify-center rounded-xl border border-zinc-700 bg-zinc-950 px-4 text-sm font-medium text-zinc-300 transition hover:bg-zinc-800">
              Cancel
            </button>
            <button id="saveTradeBtn" type="submit" class="inline-flex h-11 flex-1 items-center justify-center rounded-xl border border-zinc-700 bg-zinc-800 px-4 text-sm font-semibold text-zinc-100 transition hover:border-zinc-600 hover:bg-zinc-700">
              Save result
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
